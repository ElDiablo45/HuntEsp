name: Steam News Watcher

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug schedule trigger
        run: |
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_WORKFLOW=${GITHUB_WORKFLOW}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "UTC time: $(date -u)"
          echo "Event payload path: $GITHUB_EVENT_PATH"
          echo "---"
          cat "$GITHUB_EVENT_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Steam News Action
        env:
          token: ${{ secrets.DISCORD_TOKEN }}
          STEAM_NEWS_CHANNEL_ID: ${{ secrets.STEAM_NEWS_CHANNEL_ID }}
          STEAM_NEWS_APP_ID: ${{ secrets.STEAM_NEWS_APP_ID }}
          STEAM_NEWS_LANGUAGE: ${{ secrets.STEAM_NEWS_LANGUAGE }}
          STEAM_NEWS_FETCH_COUNT: ${{ secrets.STEAM_NEWS_FETCH_COUNT }}
          
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node steamNewsAction.js
